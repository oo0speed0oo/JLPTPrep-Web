{% extends "base.html" %}
{% block title %}— Select Chapters{% endblock %}
{% block content %}
<h1>{{ display_name }}</h1>
<h2>Select Chapters</h2>

<form method="GET" action="/setup/{{ filename }}">
  {% for unit in selected_units %}
  <input type="hidden" name="units" value="{{ unit }}">
  {% endfor %}

  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
    {% for chapter in chapters %}
    <label style="display:flex;align-items:center;gap:10px;padding:10px;
                  border-radius:8px;cursor:pointer;background:#f9f9f9;margin:2px">
      <input type="checkbox" name="chapters" value="{{ chapter }}" checked
             style="width:18px;height:18px;accent-color:#007aff">
      <span>Chapter {{ chapter }}</span>
    </label>
    {% endfor %}
    </div>
  </div>

  <button type="submit" class="btn btn-primary">Continue →</button>
  <a href="/units/{{ filename }}" class="btn btn-gray">← Back</a>
</form>
{% endblock %}
