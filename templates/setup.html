{% extends "base.html" %}
{% block title %}— Quiz Setup{% endblock %}
{% block content %}
<h1>{{ display_name }}</h1>
<h2>How many questions?</h2>

<div class="card" style="text-align:center">
  <p style="font-size:15px;color:#888;margin-bottom:8px">Questions available</p>
  <p style="font-size:48px;font-weight:700;color:#007aff">{{ total }}</p>
</div>

<form method="POST" action="/quiz/start">
  <input type="hidden" name="filename" value="{{ filename }}">
  {% for unit in units %}
  <input type="hidden" name="units" value="{{ unit }}">
  {% endfor %}
  {% for chapter in chapters %}
  <input type="hidden" name="chapters" value="{{ chapter }}">
  {% endfor %}

  <div class="card">
    <label style="font-size:15px;font-weight:600;display:block;margin-bottom:10px">
      Number of questions
    </label>
    <input type="number" name="limit" value="{{ total }}" min="1" max="{{ total }}"
           style="width:100%;padding:14px;font-size:20px;font-weight:700;
                  border:2px solid #e5e5ea;border-radius:12px;text-align:center;
                  outline:none;color:#007aff">
  </div>

  <button type="submit" class="btn btn-green">Start Quiz 🚀</button>
  <a href="/" class="btn btn-gray">← Back to Menu</a>
</form>
{% endblock %}
