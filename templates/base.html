<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLPTPrep {% block title %}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #444; }
    .card { background: white; border-radius: 16px; padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .btn { display: block; width: 100%; padding: 16px; border: none;
           border-radius: 12px; font-size: 16px; font-weight: 600;
           cursor: pointer; text-align: center; text-decoration: none;
           margin-bottom: 10px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #007aff; color: white; }
    .btn-green  { background: #34c759; color: white; }
    .btn-gray   { background: #e5e5ea; color: #1d1d1f; }
    .btn-small  { padding: 10px 20px; width: auto; display: inline-block; font-size: 14px; }
    .tag { display: inline-block; padding: 4px 10px; border-radius: 20px;
           font-size: 12px; font-weight: 600; margin: 2px; }
    .tag-blue   { background: #e3f0ff; color: #007aff; }
    .tag-green  { background: #e3f9e8; color: #34c759; }
    .tag-orange { background: #fff3e0; color: #ff9500; }
    .tag-red    { background: #ffe3e3; color: #ff3b30; }
    .meta { font-size: 13px; color: #888; margin-bottom: 6px; }
    .flag { font-size: 22px; }
    nav { display: flex; align-items: center; gap: 12px; padding: 16px 20px;
          background: white; border-bottom: 1px solid #e5e5ea; margin-bottom: 20px; }
    nav .logo { font-size: 18px; font-weight: 700; color: #1d1d1f; text-decoration: none; }
    nav .sub { font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">🇯🇵 JLPTPrep</a>
    <span class="sub">JLPT N5 · N4 Study Tool</span>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
